<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chic Luminé | Joalheria de Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --card-bg: #151515; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        header { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, var(--dark)); }
        h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: var(--gold); margin: 0; letter-spacing: 4px; }
        header p { font-size: 0.9rem; letter-spacing: 2px; color: #888; margin-top: 10px; }

        .vitrine { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            border-radius: 15px; 
            padding: 20px; 
            text-align: center;
            transition: transform 0.3s ease;
        }
        
        .card:hover { border-color: var(--gold); transform: translateY(-5px); }

        .card img { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; 
            background: #fff; 
            border-radius: 10px; 
            margin-bottom: 20px;
        }

        h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin: 15px 0; }

        .btn { 
            display: block; 
            background: var(--gold); 
            color: #000; 
            padding: 15px; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 1rem;
            transition: 0.3s;
        }

        /* AJUSTE EXCLUSIVO PARA CELULAR */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .vitrine { grid-template-columns: 1fr; padding: 15px; }
            .card { padding: 15px; }
            .card img { height: 280px; }
            .btn { font-size: 1.1rem; padding: 18px; } /* Botão maior para o polegar */
        }
    </style>
</head>
<body>
    <header>
        <h1>CHIC LUMINÉ</h1>
        <p>PREMIUM SEMI-JOIAS | 18K GOLD</p>
    </header>
    <section class="vitrine">
        <div class="card"><img src="assets/images/trevo.jpg"><h3>Trevo Signature</h3><a href="https://amzn.to/3OJj3Rd" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/girassol.jpg"><h3>Girassol Vitalis</h3><a href="https://amzn.to/4l7hjxf" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/ametista.jpg"><h3>Ametista</h3><a href="https://amzn.to/4rdD4gi" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/vitalis-hero.jpg"><h3>Árvore Vitalis</h3><a href="https://amzn.to/4ugztkv" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/ponto-luz.jpg"><h3>Ponto de Luz</h3><a href="https://amzn.to/4spu9cO" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/heart-glow.jpg"><h3>Heart Glow</h3><a href="https://amzn.to/4rG7PLR" target="_blank" class="btn">VER DETALHES</a></div>
        <div class="card"><img src="assets/images/floral-charm.jpg"><h3>Floral Charm</h3><a href="https://amzn.to/4l4b0dK" target="_blank" class="btn">VER DETALHES</a></div>
    </section>
</body>
</html>
