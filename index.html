<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elegant Choice | Premium Boutique</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <h1>ELEGANT CHOICE</h1>
            <div class="divider-line"></div>
            <p>AS FRAGRÂNCIAS MAIS SOFISTICADAS AO SEU ALCANCE</p>
        </div>
    </header>

    <main class="grid-container">
        <div class="product-card">
            <img src="img/idole.png" alt="Lancôme Idôle" class="product-image">
            <h3 class="product-title">Lancôme Idôle</h3>
            <p class="product-tagline">Floral Chipre Moderno</p>
            <a href="https://amzn.to/4aGzW7K" target="_blank" class="btn-luxury">Ver na Amazon</a>
        </div>
        <div class="product-card">
            <img src="img/scandal.png" alt="Scandal" class="product-image">
            <h3 class="product-title">Scandal Le Parfum</h3>
            <p class="product-tagline">Âmbar Floral Intenso</p>
            <a href="https://amzn.to/4r0dNGf" target="_blank" class="btn-luxury">Ver na Amazon</a>
        </div>
        <div class="product-card">
            <img src="img/libre.jpg" alt="Libre" class="product-image">
            <h3 class="product-title">Libre YSL</h3>
            <p class="product-tagline">Fougère Oriental Arrojado</p>
            <a href="https://amzn.to/3OFB17f" target="_blank" class="btn-luxury">Ver na Amazon</a>
        </div>
        </main>

    <footer class="footer">
        <p>&copy; 2026 Elegant Choice Boutique. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
